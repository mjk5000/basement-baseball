<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 100 100">
  <!-- Green grass background - full square -->
  <rect width="100" height="100" fill="#2d7a1f"/>
  
  <!-- Brown dirt diamond - larger to fill space -->
  <path d="M 50 90 L 90 50 L 50 10 L 10 50 Z" fill="#d4a574" stroke="#8b6f47" stroke-width="1.5"/>
  
  <!-- White bases -->
  <rect x="44" y="6" width="12" height="12" fill="white" stroke="#333" stroke-width="0.5" rx="1"/>
  <rect x="82" y="44" width="12" height="12" fill="white" stroke="#333" stroke-width="0.5" rx="1"/>
  <rect x="6" y="44" width="12" height="12" fill="white" stroke="#333" stroke-width="0.5" rx="1"/>
  <polygon points="44,82 56,82 56,88 50,94 44,88" fill="white" stroke="#333" stroke-width="0.5"/>
  
  <!-- Capital "B" in darker green -->
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#1a5012" text-anchor="middle">B</text>
  
  <!-- Lowercase "b" on top in lighter green -->
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#3a9a2a" text-anchor="middle">b</text>
</svg>
